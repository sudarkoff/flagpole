name: publish-react

# Publishes @sudarkoff/flagpole-react to npm when a react-vX.Y.Z tag is pushed.
# Auth is via npm OIDC "trusted publishing" (no stored token) and the publish is
# attested with provenance. See RELEASING.md for the one-time npmjs.com setup.

on:
  push:
    tags:
      - "react-v*"

permissions:
  contents: read
  id-token: write # required for npm provenance + OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing requires npm >= 11.5.1, newer than the npm
      # bundled with Node 22.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Guard: the tag must match the package version (react-vX.Y.Z <-> X.Y.Z).
      - name: Verify tag matches package version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#react-v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME (=$tag) does not match package.json version $pkg"
            exit 1
          fi

      # No NODE_AUTH_TOKEN: authentication comes from OIDC trusted publishing.
      - run: npm publish --provenance --access public
